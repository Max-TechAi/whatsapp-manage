<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Your Password — WhatsApp Business Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f19;
      --panel: rgba(17, 24, 39, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --accent: #10b981;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: radial-gradient(circle at top right, #1e1b4b, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      background: var(--panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 2.5rem;
      height: 2.5rem;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      color: #fff;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      letter-spacing: -0.025em;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 2rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    input {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.875rem 1rem;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px var(--primary);
    }

    .btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      padding: 0.875rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 1rem;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .error-banner {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
      line-height: 1.4;
    }

    .success-banner {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--accent);
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
      line-height: 1.4;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <div class="logo-icon">WA</div>
      <h1 style="font-size: 1.1rem; font-weight: 700; letter-spacing: -0.025em;">WhatsApp Business</h1>
    </div>

    <h2>Accept Invitation</h2>
    <p class="subtitle">Please choose a password to complete your account setup and join your team dashboard.</p>

    <div id="errorBanner" class="error-banner"></div>
    <div id="successBanner" class="success-banner"></div>

    <form id="setPasswordForm" onsubmit="handleSetPassword(event)">
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" minlength="8" required>
      </div>

      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm password" minlength="8" required>
      </div>

      <button type="submit" id="submitBtn" class="btn">Set Password & Log In</button>
    </form>
  </div>

  <script>
    // Parse query params to get token
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const form = document.getElementById('setPasswordForm');
    const errorBanner = document.getElementById('errorBanner');
    const successBanner = document.getElementById('successBanner');
    const submitBtn = document.getElementById('submitBtn');

    if (!token) {
      form.style.display = 'none';
      showError('Invitation token is missing. Please check your invitation email link or contact your administrator.');
    }

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.style.display = 'block';
      successBanner.style.display = 'none';
    }

    function showSuccess(msg) {
      successBanner.textContent = msg;
      successBanner.style.display = 'block';
      errorBanner.style.display = 'none';
    }

    async function handleSetPassword(e) {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Saving...';
        errorBanner.style.display = 'none';

        const response = await fetch('/api/auth/set-password-from-invite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const resData = await response.json();

        if (response.ok && resData.success) {
          showSuccess('Password set successfully! Logging you in...');
          form.style.display = 'none';
          
          // Store token in localStorage and redirect
          localStorage.setItem('token', resData.tokens.accessToken);
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
        } else {
          showError(resData.error || 'Failed to set password. Link may have expired.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Set Password & Log In';
        }
      } catch (err) {
        showError(err.message || 'An error occurred. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Set Password & Log In';
      }
    }
  </script>
</body>
</html>
