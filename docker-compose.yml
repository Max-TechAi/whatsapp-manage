services:
  # ─── STORAGE LAYER ───────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: wa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: whatsapp_db
      POSTGRES_USER: whatsapp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret_password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsapp -d whatsapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c shared_preload_libraries='pg_stat_statements'
        -c pg_stat_statements.track=all
        -c log_statement=mod
        -c log_min_duration_statement=500
    networks:
      - wa-network

  redis:
    image: redis:7-alpine
    container_name: wa-redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --maxmemory-policy noeviction
        --requirepass ${REDIS_PASSWORD:-redis_secret_password}
        --maxmemory 512mb
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wa-network

  minio:
    image: minio/minio:latest
    container_name: wa-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_secret_password}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wa-network

  # ─── CORE SERVICES ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-api
    restart: unless-stopped
    command: ["node", "dist/index.js"]
    environment:
      NODE_ENV: production
      RUN_SESSION_RUNNER: "false"
      DATABASE_URL: postgresql://whatsapp:${DB_PASSWORD:-secret_password}@postgres:5432/whatsapp_db
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_password}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_secret_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-whatsapp-media}
      MINIO_USE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-256-bit-secret-key-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      PORT: 3000
      WS_PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SECURE: ${SMTP_SECURE}
      EMAIL_FROM: ${EMAIL_FROM}
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - wa-network

  session-runner:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/session-runner.js"]
    environment:
      NODE_ENV: production
      RUN_SESSION_RUNNER: "true"
      DATABASE_URL: postgresql://whatsapp:${DB_PASSWORD:-secret_password}@postgres:5432/whatsapp_db
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_password}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_secret_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-whatsapp-media}
      MINIO_USE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-256-bit-secret-key-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SECURE: ${SMTP_SECURE}
      EMAIL_FROM: ${EMAIL_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - wa-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-worker
    restart: unless-stopped
    command: ["node", "dist/events/worker-entry.js"]
    environment:
      NODE_ENV: production
      RUN_SESSION_RUNNER: "false"
      DATABASE_URL: postgresql://whatsapp:${DB_PASSWORD:-secret_password}@postgres:5432/whatsapp_db
      DB_POOL_MAX: 5
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_password}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_secret_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-whatsapp-media}
      MINIO_USE_SSL: "false"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-256-bit-secret-key-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SECURE: ${SMTP_SECURE}
      EMAIL_FROM: ${EMAIL_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wa-network

  # ─── API GATEWAY ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: wa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - wa-network

  # ─── OBSERVABILITY ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: wa-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - wa-network

  grafana:
    image: grafana/grafana:latest
    container_name: wa-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3030:3000"
    depends_on:
      - prometheus
    networks:
      - wa-network

volumes:
  pg_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  wa-network:
    driver: bridge
